<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./main.js" defer></script>
    <title>Produtos</title>
</head>
<body class="bg-gray-300 flex flex-col items-center  justify-center h-screen gap-8">
    <h1 class="text-2xl">Listas Produtos</h1>
    <input type="text" class="text-center border py-2 rounded-[50px]" placeholder="Código" id="codigoColocar">
    <input type="text" class="text-center border py-2 rounded-[50px] " placeholder="Produto" id="produtoColocar">
    <input type="text" class="text-center border py-2 rounded-[50px]" placeholder="Quantidade" id="quantidadeColocar">
    <button id="buttonAdd" class="bg-blue-400 text-white px-4 py-2 rounded-[30px]"
        onclick="adicionarProduto()"
    >Adicionar</button>
    <div id="listas"
        class="flex  gap-4 items-center w-50 "></div>
</body>
</html>
